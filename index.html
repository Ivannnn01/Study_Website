<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySpace — Login</title>
  <meta name="description" content="Log in or sign up to access your personal study dashboard with subject tracking, practice papers, and weakness leaderboards." />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
<div class="page-wrapper auth-page">
  <div class="auth-card">

    
    <div class="auth-brand">
      <div class="auth-logo">
        
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="8" y1="7" x2="16" y2="7"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <h1>StudySpace</h1>
      <p>Your personal A-level study hub</p>
    </div>

    
    <div class="auth-tabs" role="tablist">
      <button id="tab-login"  class="auth-tab active" role="tab" aria-selected="true"  aria-controls="form-login">Log In</button>
      <button id="tab-signup" class="auth-tab"        role="tab" aria-selected="false" aria-controls="form-signup">Sign Up</button>
    </div>

    
    <div id="form-login" class="auth-form" role="tabpanel" aria-labelledby="tab-login">
      <div class="auth-error" id="login-error" role="alert"></div>

      <div class="form-group">
        <label for="login-username">Username</label>
        <div class="input-icon-wrap">
          <input
            type="text"
            id="login-username"
            autocomplete="username"
            placeholder="Enter your username"
            spellcheck="false"
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-icon-wrap" style="position:relative">
          <input
            type="password"
            id="login-password"
            class="pw-field"
            autocomplete="current-password"
            placeholder="Enter your password"
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button class="pw-toggle" type="button" data-target="login-password" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button id="btn-login" class="btn btn-primary btn-lg auth-submit" type="button">
        Log In
      </button>
    </div>

    
    <div id="form-signup" class="auth-form" role="tabpanel" aria-labelledby="tab-signup" style="display:none">
      <div class="auth-error" id="signup-error" role="alert"></div>

      <div class="form-group">
        <label for="signup-username">Username</label>
        <div class="input-icon-wrap">
          <input
            type="text"
            id="signup-username"
            autocomplete="username"
            placeholder="Choose a username"
            spellcheck="false"
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <div class="input-icon-wrap" style="position:relative">
          <input
            type="password"
            id="signup-password"
            class="pw-field"
            autocomplete="new-password"
            placeholder="Choose a password (min 6 chars)"
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button class="pw-toggle" type="button" data-target="signup-password" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        
        <div class="pw-strength">
          <div class="pw-strength-bar" aria-hidden="true">
            <div class="pw-strength-seg"></div>
            <div class="pw-strength-seg"></div>
            <div class="pw-strength-seg"></div>
          </div>
          <span id="pw-strength-label" class="pw-strength-label"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="signup-confirm">Confirm Password</label>
        <div class="input-icon-wrap" style="position:relative">
          <input
            type="password"
            id="signup-confirm"
            class="pw-field"
            autocomplete="new-password"
            placeholder="Repeat your password"
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <button class="pw-toggle" type="button" data-target="signup-confirm" aria-label="Toggle password visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button id="btn-signup" class="btn btn-primary btn-lg auth-submit" type="button">
        Create Account
      </button>
    </div>

    
    <p class="auth-footer-note">
      Your data is stored locally in your browser.<br>No server, no tracking.
    </p>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
